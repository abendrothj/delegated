name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-core:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Core tests
        run: cargo test

  validate-release:
    runs-on: ubuntu-latest
    needs: validate-core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Integration server test
        run: cargo test --features "axum,client" --test integration_server

      - name: Full feature tests
        run: cargo test --all-features

      - name: Verify release provenance
        run: ./scripts/verify_release_provenance.sh

      - name: Publish dry-run
        run: cargo publish --dry-run --allow-dirty
