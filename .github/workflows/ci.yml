name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Core tests
        run: cargo test

      - name: Integration server test
        run: cargo test --features "axum,client" --test integration_server

      - name: Full feature tests
        run: cargo test --features "async,axum,client,tracing,metrics"

      - name: Publish dry-run
        run: cargo publish --dry-run --allow-dirty
